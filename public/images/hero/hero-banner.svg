<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9FA"/>
      <stop offset="25%" stop-color="#FFE5EC"/>
      <stop offset="55%" stop-color="#FFB6C1"/>
      <stop offset="85%" stop-color="#FF4F87"/>
      <stop offset="100%" stop-color="#D63E6E"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4F87" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFE5EC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base gradient -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Large ambient glows -->
  <circle cx="200" cy="150" r="400" fill="url(#radial)"/>
  <circle cx="1200" cy="700" r="350" fill="url(#radial)"/>
  <circle cx="700" cy="450" r="500" fill="url(#glow1)"/>
  <circle cx="1000" cy="200" r="300" fill="url(#glow2)"/>

  <!-- Decorative rings -->
  <circle cx="1100" cy="250" r="160" stroke="#FFB6C1" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1100" cy="250" r="120" stroke="#FFB6C1" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1300" cy="650" r="100" stroke="#FF4F87" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1300" cy="650" r="70" stroke="#FF4F87" stroke-width="0.5" opacity="0.1"/>

  <!-- Abstract cake/dessert silhouette right side -->
  <g opacity="0.08">
    <!-- Tiered cake shape -->
    <rect x="1050" y="500" width="200" height="60" rx="8" fill="white"/>
    <rect x="1070" y="430" width="160" height="70" rx="6" fill="white"/>
    <rect x="1090" y="370" width="120" height="60" rx="5" fill="white"/>
    <!-- Candle -->
    <rect x="1145" y="330" width="10" height="40" rx="5" fill="white"/>
    <ellipse cx="1150" cy="325" rx="8" ry="6" fill="white"/>
  </g>

  <!-- Left side decorative pattern -->
  <g opacity="0.06">
    <path d="M50 200 Q100 150 150 200 Q200 250 250 200" stroke="white" stroke-width="1" fill="none"/>
    <path d="M50 250 Q100 200 150 250 Q200 300 250 250" stroke="white" stroke-width="1" fill="none"/>
    <path d="M50 300 Q100 250 150 300 Q200 350 250 300" stroke="white" stroke-width="1" fill="none"/>
  </g>

  <!-- Sparkle dots -->
  <g fill="white" opacity="0.15">
    <circle cx="350" cy="200" r="2"/>
    <circle cx="380" cy="180" r="1.5"/>
    <circle cx="330" cy="230" r="1"/>
    <circle cx="1050" cy="300" r="2"/>
    <circle cx="1020" cy="280" r="1"/>
    <circle cx="1250" cy="400" r="1.5"/>
    <circle cx="1280" cy="430" r="1"/>
    <circle cx="400" cy="600" r="2"/>
    <circle cx="430" cy="580" r="1"/>
    <circle cx="370" cy="620" r="1.5"/>
  </g>

  <!-- Bottom wave decoration -->
  <path d="M0 850 Q180 820 360 840 Q540 860 720 835 Q900 810 1080 840 Q1260 870 1440 845 L1440 900 L0 900 Z" fill="white" opacity="0.04"/>
</svg>
